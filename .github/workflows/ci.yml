name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Xcode 26.x is the Swift 6.2-family toolchain for this package.
  XCODE_VERSION: "26.2"

jobs:
  swift-package:
    name: SwiftPM macOS build/test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test with warnings as errors
        run: swift test -Xswiftc -warnings-as-errors

      - name: Build package documentation
        run: |
          mkdir -p '${{ runner.temp }}/SymbolGraphs' '${{ runner.temp }}/ClangModuleCache'
          CLANG_MODULE_CACHE_PATH='${{ runner.temp }}/ClangModuleCache' swift build \
            --target SpeechKit \
            -Xswiftc -warnings-as-errors \
            -Xswiftc -emit-symbol-graph \
            -Xswiftc -emit-symbol-graph-dir \
            -Xswiftc '${{ runner.temp }}/SymbolGraphs'
          xcrun docc convert Sources/SpeechKit/SpeechKit.docc \
            --additional-symbol-graph-dir '${{ runner.temp }}/SymbolGraphs' \
            --output-dir '${{ runner.temp }}/SpeechKit.doccarchive' \
            --fallback-display-name SpeechKit \
            --fallback-bundle-identifier com.sentinelite.SpeechKit \
            --fallback-bundle-version 1.0.0 \
            --warnings-as-errors

  platform-build:
    name: ${{ matrix.name }} build
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            destination: platform=macOS
            derived-data: macos
          - name: iOS
            destination: generic/platform=iOS
            derived-data: ios
          - name: watchOS
            destination: generic/platform=watchOS
            derived-data: watchos
          - name: visionOS
            destination: generic/platform=visionOS
            derived-data: visionos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Build ${{ matrix.name }}
        run: |
          xcodebuild build \
            -scheme SpeechKit \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath '${{ runner.temp }}/DerivedData/${{ matrix.derived-data }}' \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-warnings-as-errors"

  demo-app:
    name: SpeechKitDemo iOS build/docs
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Build demo app
        run: |
          xcodebuild build \
            -project Examples/SpeechKitDemo/SpeechKitDemo.xcodeproj \
            -scheme SpeechKitDemo \
            -destination 'generic/platform=iOS' \
            -derivedDataPath '${{ runner.temp }}/DerivedData/SpeechKitDemo' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build demo documentation
        run: |
          xcodebuild docbuild \
            -project Examples/SpeechKitDemo/SpeechKitDemo.xcodeproj \
            -scheme SpeechKitDemo \
            -destination 'generic/platform=iOS' \
            -derivedDataPath '${{ runner.temp }}/DerivedData/SpeechKitDemoDocs' \
            CODE_SIGNING_ALLOWED=NO
