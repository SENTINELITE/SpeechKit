name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Xcode 26.x is the Swift 6.2-family toolchain for this package.
  XCODE_VERSION: "26.2"

jobs:
  swift-package:
    name: SwiftPM macOS build/test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Build with warnings as errors
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test with warnings as errors
        run: swift test -Xswiftc -warnings-as-errors

  platform-build:
    name: ${{ matrix.name }} build
    runs-on: macos-26

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            destination: platform=macOS
            derived-data: macos
          - name: iOS
            destination: generic/platform=iOS
            derived-data: ios
          - name: watchOS
            destination: generic/platform=watchOS
            derived-data: watchos
          - name: visionOS
            destination: generic/platform=visionOS
            derived-data: visionos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          xcodebuild -version
          xcode-select -p
          swift --version

      - name: Build ${{ matrix.name }}
        run: |
          xcodebuild build \
            -scheme SpeechKit \
            -destination '${{ matrix.destination }}' \
            -derivedDataPath '${{ runner.temp }}/DerivedData/${{ matrix.derived-data }}' \
            CODE_SIGNING_ALLOWED=NO \
            OTHER_SWIFT_FLAGS="-warnings-as-errors"
